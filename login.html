<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0e14">
  <link rel="stylesheet" href="admin.css">
  <title>Admin · Sign in</title>
</head>
<body class="admin">
  <div class="admin-login-wrap">
    <form class="admin-login-card" id="login-form">
      <h1>KYC Admin</h1>
      <p>Sign in to review verifications.</p>
      <input type="text" id="firm" name="firm" placeholder="Firm" autocomplete="organization" autofocus>
      <input type="text" id="username" name="username" placeholder="Username" autocomplete="username">
      <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
      <div class="error" id="error"></div>
      <button type="submit" class="admin-btn primary" style="width:100%">Sign in</button>
    </form>
  </div>

  <script>
    const form  = document.getElementById('login-form');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.textContent = '';
      const password = document.getElementById('password').value;
      const firm     = document.getElementById('firm').value.trim();
      const username = document.getElementById('username').value.trim();

      try {
        const body = { password };
        if (firm) body.firm = firm;
        if (username) body.username = username;
        const resp = await fetch('/api/v1/admin/login', {
          method: 'POST',
          body: new URLSearchParams(body),
        });
        if (!resp.ok) {
          // Always the same generic message, whatever the backend's `detail`
          // says — a message that differs between "no such user" and "wrong
          // password" lets an attacker enumerate valid usernames.
          error.textContent = 'Invalid username or password';
          return;
        }
        const result = await resp.json();
        sessionStorage.setItem('kyc_super_admin', result.super_admin ? '1' : '');
        sessionStorage.setItem('kyc_display_name', result.display_name || '');
        sessionStorage.setItem('kyc_can_create_users', result.can_create_users ? '1' : '');
        location.href = 'list';
      } catch (err) {
        error.textContent = 'Network error — try again';
      }
    });
  </script>
</body>
</html>
