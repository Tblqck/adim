<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0e14">
  <link rel="stylesheet" href="admin.css">
  <title>Admin · Verification Detail</title>
</head>
<body class="admin">
  <div class="admin-shell">
    <div class="admin-topbar">
      <div>
        <h1 id="case-title">Verification #—</h1>
        <div class="sub" id="case-sub">Loading…</div>
      </div>
      <div class="review-actions">
        <span class="badge" id="review-status" style="display:none"></span>
        <input type="text" id="reviewer-name" placeholder="Your name" style="width:120px">
        <button class="admin-btn" id="edit-btn">Edit values</button>
        <button class="admin-btn primary" id="save-btn" style="display:none">Save changes</button>
        <button class="admin-btn" id="reject-btn" style="border-color:rgba(255,85,117,0.4);color:#ff5575">Reject</button>
        <button class="admin-btn primary" id="approve-btn">Approve</button>
        <a class="admin-btn" href="list">← Back</a>
      </div>
    </div>

    <div class="admin-error-banner" id="detail-error"></div>

    <div class="admin-tabbar" id="tabbar">
      <div class="admin-tab active" data-tab="overview">Overview</div>
      <div class="admin-tab" data-tab="scores">Model Scores</div>
      <div class="admin-tab" data-tab="mrz">MRZ Checksums &amp; Validation</div>
      <div class="admin-tab" data-tab="cross">Printed vs MRZ Cross-Check</div>
      <div class="admin-tab" data-tab="forensics">Forensics &amp; EXIF Check</div>
      <div class="admin-tab" data-tab="pep">PEP &amp; Sanctions Checklist</div>
    </div>

    <div class="tab-panel" data-panel="overview"></div>
    <div class="tab-panel" data-panel="scores" style="display:none"></div>
    <div class="tab-panel" data-panel="mrz" style="display:none"></div>
    <div class="tab-panel" data-panel="cross" style="display:none"></div>
    <div class="tab-panel" data-panel="forensics" style="display:none"></div>
    <div class="tab-panel" data-panel="pep" style="display:none"></div>
  </div>

  <div class="img-modal" id="img-modal">
    <div class="img-modal-backdrop"></div>
    <div class="img-modal-content" id="img-modal-content"></div>
    <button class="img-modal-close" id="img-modal-close">✕</button>
  </div>

  <script src="admin.js"></script>
  <script src="detail.js"></script>
</body>
</html>
