<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020814">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/app.css">
  <title>Step 3 · Review &amp; Submit</title>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">Step 3 · Review</p>
        <h1>Package the captures into your system</h1>
        <p class="lede">Confirm the frames below, then emit the JSON payload. You can retake any step without refreshing.</p>
      </header>

      <section class="review-grid">
        <article class="review-card">
          <p class="eyebrow">Document</p>
          <h3>ID capture</h3>
          <img id="review-id" alt="ID capture result">
          <ul id="id-metrics"></ul>
        </article>

        <article class="review-card">
          <p class="eyebrow">Liveness</p>
          <h3>Live frame</h3>
          <img id="review-face" alt="Face capture result">
          <ul id="challenge-review"></ul>
        </article>
      </section>

      <section class="payload-card">
        <div class="payload-header">
          <span>Integration payload</span>
          <button id="copy-payload">Copy JSON</button>
        </div>
        <pre id="payload-json">{}</pre>
      </section>

      <div class="actions">
        <button class="primary" id="submit-btn">Emit Payload</button>
        <button class="ghost" id="restart-flow">Start Over</button>
      </div>
      <div class="secondary-actions">
        <button id="retake-id">Retake ID Step</button>
        <button id="retake-face">Retake Liveness Step</button>
      </div>
    </div>
  </div>

  <script>window.KYC_ENDPOINT = '/save';</script>
  <script type="module" src="scripts/handoff.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
