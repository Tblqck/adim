<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020814">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KYC Verify">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/app.css">
  <title>Step 1 · Document</title>
</head>
<body>

  <div class="page">
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">Step 1 · Document</p>
        <h1>Choose your document</h1>
        <p class="lede">Select the issuing country and the type of identity document you are scanning.</p>
      </header>

      <div class="select-block">

        <div class="select-section">
          <p class="select-label">Country of issue</p>
          <div class="country-search-wrap">
            <input
              type="text"
              id="country-input"
              class="country-input"
              placeholder="Search country…"
              autocomplete="off"
              spellcheck="false"
            >
            <ul class="country-list" id="country-list" hidden></ul>
          </div>
          <div class="selected-tag" id="selected-country-tag" hidden>
            <span id="sel-flag"></span>
            <span id="sel-name"></span>
            <button class="tag-clear" id="clear-country" aria-label="Clear">×</button>
          </div>
        </div>

        <div class="select-section">
          <p class="select-label">Document type</p>
          <div class="doc-type-grid" id="doc-type-grid">
            <button class="doc-type-card" data-type="passport" data-label="Passport">
              <span class="doc-icon">🛂</span>
              <span class="doc-name">Passport</span>
              <span class="doc-hint">Front only</span>
            </button>
            <button class="doc-type-card" data-type="national_id" data-label="National ID">
              <span class="doc-icon">🪪</span>
              <span class="doc-name">National ID</span>
              <span class="doc-hint">Front + Back</span>
            </button>
            <button class="doc-type-card" data-type="drivers_license" data-label="Driver's License">
              <span class="doc-icon">🚗</span>
              <span class="doc-name">Driver's License</span>
              <span class="doc-hint">Front + Back</span>
            </button>
            <button class="doc-type-card" data-type="residence_permit" data-label="Residence Permit">
              <span class="doc-icon">📋</span>
              <span class="doc-name">Residence Permit</span>
              <span class="doc-hint">Front + Back</span>
            </button>
          </div>
        </div>

      </div>

      <div class="actions">
        <button class="primary" id="begin-btn" disabled>Begin Capture</button>
      </div>
    </div>
  </div>

  <script src="scripts/countries.js"></script>
  <script type="module" src="scripts/id.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
